# ydn64 — TUN-less Yggdrasil node with NAT64 + DNS64
# Generated by: ydn64 -genconf

# Path to the yggdrasil HJSON config file.
yggdrasil_conf = "./yggdrasil.conf"

# Shared allowed source filter for both NAT64 and DNS64 services.
# CIDR notation or individual IPv6 addresses.
allowed_sources = ["200::/7"]

[nat64]
enable = true
pool6 = "300:d203:2626:f0a::/96"
# Idle timeout in seconds before a UDP NAT64 session is expired.
udp_timeout = 30

[dns64]
enable = false
listen = "[200:d203:2626:f0a:a313:43f0:c33d:f6e7]:53"
default = "8.8.8.8:53"
cache_expiration = 300
cache_purge = 600
# invalid_address: "ignore" | "process" | "discard"
invalid_address = "ignore"

# Default zone: synthesise AAAA records from A records using the NAT64 prefix.
[dns64.zones.default]
domains = ["."]
return-public-ipv4 = false
prefix = "300:d203:2626:f0a::"

# Example: Yggdrasil-native .ygg zone — forward to Alfis DNS, pass through 200::/7 responses.
# [dns64.zones.ygg]
# domains = [".ygg"]
# forwarder = "[308:84:68:55::]:53"

# Example: Pass-through zone — return real IPv4 and IPv6 records unchanged.
# [dns64.zones.passthrough]
# domains = ["example.com", "com.tr"]
# return-public-ipv4 = true
# return-public-ipv6 = true
